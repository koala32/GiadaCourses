<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Helpy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" style="background:var(--text);border:none;">
    <div class="container" style="max-width:100%;padding:0 20px;">
      <div class="flex items-center gap-2">
        <button class="mobile-menu" style="color:#fff;" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
        <a href="/admin" class="nav-logo" style="color:#fff;">🛡️ Helpy <span style="color:rgba(255,255,255,0.5);">Admin</span></a>
      </div>
      <div class="flex items-center gap-2">
        <a href="/app" class="btn btn-sm" style="color:rgba(255,255,255,0.7);">Vai al sito →</a>
        <button onclick="logout()" class="btn btn-sm" style="color:rgba(255,255,255,0.7);">Esci</button>
      </div>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar" style="border-right-color:var(--border);">
      <div class="sidebar-section">
        <div class="sidebar-label">Dashboard</div>
        <button class="sidebar-link active" data-page="overview" onclick="go('overview')"><span class="icon">📊</span> Panoramica</button>
        <button class="sidebar-link" data-page="tickets" onclick="go('tickets')"><span class="icon">💬</span> Ticket <span class="badge badge-danger hidden" id="openBadge">0</span></button>
        <button class="sidebar-link" data-page="users" onclick="go('users')"><span class="icon">👥</span> Utenti</button>
        <button class="sidebar-link" data-page="activity" onclick="go('activity')"><span class="icon">📋</span> Attività</button>
      </div>
    </aside>

    <main class="main-content" id="mc">
      <div class="loading-screen"><div class="spinner"></div></div>
    </main>
  </div>

  <script>
    let me = null;
    let ticketFilter = 'tutti';

    async function init() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) throw new Error();
        me = await r.json();
        if (me.role !== 'superadmin' && me.role !== 'admin') {
          window.location.href = '/app';
          return;
        }
        go('overview');
      } catch { window.location.href = '/login'; }
    }

    function go(page) {
      document.querySelectorAll('.sidebar-link[data-page]').forEach(l => l.classList.toggle('active', l.dataset.page === page));
      document.querySelector('.sidebar')?.classList.remove('open');
      const mc = document.getElementById('mc');
      mc.innerHTML = '<div class="loading-screen"><div class="spinner"></div></div>';
      if (page === 'overview') renderOverview();
      else if (page === 'tickets') renderAdminTickets();
      else if (page === 'users') renderUsers();
      else if (page === 'activity') renderActivity();
      else if (page.startsWith('ticket-')) renderAdminTicketDetail(page.replace('ticket-', ''));
      else if (page.startsWith('user-')) renderUserDetail(page.replace('user-', ''));
    }

    async function renderOverview() {
      const r = await fetch('/api/admin/stats');
      const s = await r.json();
      document.getElementById('mc').innerHTML = `
        <h2 style="margin-bottom:24px;">📊 Panoramica</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon" style="background:var(--primary-bg);">👥</div><div><div class="stat-value">${s.totalUsers}</div><div class="stat-label">Utenti registrati</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:var(--secondary-bg);">✅</div><div><div class="stat-value">${s.activeToday}</div><div class="stat-label">Attivi oggi</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:var(--accent-bg);">💬</div><div><div class="stat-value">${s.openTickets}</div><div class="stat-label">Ticket aperti</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:var(--danger-bg);">🚫</div><div><div class="stat-value">${s.bannedUsers}</div><div class="stat-label">Bannati</div></div></div>
        </div>
        <div class="grid" style="grid-template-columns:1fr 1fr;gap:24px;">
          <div class="card">
            <h3 style="margin-bottom:16px;">Ticket per categoria</h3>
            ${s.ticketsByCategory.map(c => `
              <div class="flex items-center" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);">
                <span style="text-transform:capitalize;">${c.category}</span>
                <span class="badge badge-muted">${c.count}</span>
              </div>
            `).join('') || '<p style="color:var(--text-muted);">Nessun ticket</p>'}
          </div>
          <div class="card">
            <h3 style="margin-bottom:16px;">Registrazioni recenti</h3>
            ${s.recentRegistrations.map(r => `
              <div class="flex items-center" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);">
                <span>${r.day}</span>
                <span class="badge badge-primary">${r.count} nuovi</span>
              </div>
            `).join('') || '<p style="color:var(--text-muted);">Nessuna registrazione</p>'}
          </div>
        </div>
        <div class="card mt-3">
          <h3>Azioni rapide</h3>
          <div class="flex gap-1 mt-2 flex-wrap">
            <button class="btn btn-primary btn-sm" onclick="go('tickets')">Gestisci ticket</button>
            <button class="btn btn-secondary btn-sm" onclick="go('users')">Gestisci utenti</button>
            <button class="btn btn-secondary btn-sm" onclick="go('activity')">Log attività</button>
          </div>
        </div>
      `;
      // Update badge
      if (s.openTickets > 0) {
        const b = document.getElementById('openBadge');
        b.textContent = s.openTickets;
        b.classList.remove('hidden');
      }
    }

    async function renderAdminTickets() {
      const r = await fetch(`/api/admin/tickets?status=${ticketFilter}`);
      const d = await r.json();
      document.getElementById('mc').innerHTML = `
        <h2 style="margin-bottom:4px;">💬 Gestione ticket</h2>
        <p style="margin-bottom:20px;">${d.total} ticket totali</p>
        <div class="tabs">
          ${['tutti','aperto','in_lavorazione','risolto','chiuso'].map(s => `
            <button class="tab ${ticketFilter===s?'active':''}" onclick="ticketFilter='${s}';go('tickets')">${s.replace('_',' ')}</button>
          `).join('')}
        </div>
        ${d.tickets.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><h3>Nessun ticket</h3></div>' : `
          <div class="table-wrap"><table>
            <thead><tr><th>Utente</th><th>Oggetto</th><th>Categoria</th><th>Stato</th><th>Messaggi</th><th>Aggiornato</th></tr></thead>
            <tbody>
              ${d.tickets.map(t => `
                <tr style="cursor:pointer;" onclick="go('ticket-${t.id}')">
                  <td><strong>${t.display_name}</strong><br><span style="font-size:0.75rem;color:var(--text-muted);">@${t.username}</span></td>
                  <td>${t.subject}</td>
                  <td><span style="text-transform:capitalize;">${t.category}</span></td>
                  <td><span class="badge ${getStatusBadge(t.status)}">${t.status.replace('_',' ')}</span></td>
                  <td>${t.message_count}</td>
                  <td style="font-size:0.82rem;">${fmt(t.updated_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table></div>
        `}
      `;
    }

    async function renderAdminTicketDetail(id) {
      const r = await fetch(`/api/chat/tickets/${id}`);
      const t = await r.json();
      document.getElementById('mc').innerHTML = `
        <button class="btn btn-ghost btn-sm mb-3" onclick="go('tickets')">← Torna ai ticket</button>
        <div class="flex items-center mb-2" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <h2 style="font-size:1.2rem;">${t.subject}</h2>
            <div style="font-size:0.82rem;color:var(--text-muted);">
              Da: <strong>${t.user?.display_name || 'Utente'}</strong> (${t.user?.email || ''}) · ${t.category} · ${fmt(t.created_at)}
            </div>
          </div>
          <div class="flex gap-1">
            <select class="form-input" style="width:auto;padding:8px 12px;font-size:0.82rem;" onchange="changeTicketStatus('${id}',this.value)">
              ${['aperto','in_lavorazione','risolto','chiuso'].map(s => `<option value="${s}" ${t.status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="chat-container">
          <div class="chat-body" id="chatBody">
            ${t.messages.map(m => `
              <div class="chat-msg ${m.is_admin ? 'chat-msg-admin' : 'chat-msg-user'}">
                <div class="chat-msg-name">${m.is_admin ? '🛡️ ' + m.display_name : '👤 ' + m.display_name}</div>
                ${m.message}
                <div class="chat-msg-time">${fmt(m.created_at)}</div>
              </div>
            `).join('')}
          </div>
          ${t.status !== 'chiuso' ? `
            <div class="chat-input-bar">
              <input type="text" id="chatInput" placeholder="Rispondi come admin..." onkeydown="if(event.key==='Enter')sendAdminMsg('${id}')">
              <button class="btn btn-primary" onclick="sendAdminMsg('${id}')">Rispondi</button>
            </div>
          ` : ''}
        </div>
      `;
      document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
    }

    async function sendAdminMsg(id) {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      await fetch(`/api/chat/tickets/${id}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      go(`ticket-${id}`);
    }

    async function changeTicketStatus(id, status) {
      await fetch(`/api/admin/tickets/${id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
    }

    async function renderUsers(search = '') {
      const r = await fetch(`/api/admin/users?search=${encodeURIComponent(search)}&limit=50`);
      const d = await r.json();
      document.getElementById('mc').innerHTML = `
        <h2 style="margin-bottom:4px;">👥 Gestione utenti</h2>
        <p style="margin-bottom:20px;">${d.total} utenti registrati</p>
        <div class="mb-3">
          <input type="text" class="form-input" placeholder="Cerca per username, email o nome..." 
            style="max-width:400px;" value="${search}"
            oninput="clearTimeout(window._st);window._st=setTimeout(()=>renderUsers(this.value),300)">
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Utente</th><th>Email</th><th>Registrato</th><th>Ultimo accesso</th><th>Ticket</th><th>Stato</th><th>Azioni</th></tr></thead>
          <tbody>
            ${d.users.map(u => `
              <tr>
                <td><strong>${u.display_name}</strong><br><span style="font-size:0.75rem;color:var(--text-muted);">@${u.username}</span></td>
                <td style="font-size:0.85rem;">${u.email}</td>
                <td style="font-size:0.82rem;">${fmt(u.created_at)}</td>
                <td style="font-size:0.82rem;">${u.last_login ? fmt(u.last_login) : 'Mai'}</td>
                <td>${u.ticketCount}</td>
                <td>${u.is_banned ? '<span class="badge badge-danger">Bannato</span>' : '<span class="badge badge-success">Attivo</span>'}</td>
                <td>
                  <button class="btn btn-ghost btn-sm" onclick="go('user-${u.id}')">Dettagli</button>
                  ${u.is_banned
                    ? `<button class="btn btn-sm btn-success" onclick="unbanUser('${u.id}')">Sbanna</button>`
                    : `<button class="btn btn-sm btn-danger" onclick="banUser('${u.id}')">Banna</button>`
                  }
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table></div>
      `;
    }

    async function renderUserDetail(id) {
      const r = await fetch(`/api/admin/users/${id}`);
      const d = await r.json();
      document.getElementById('mc').innerHTML = `
        <button class="btn btn-ghost btn-sm mb-3" onclick="go('users')">← Torna agli utenti</button>
        <div class="card mb-3">
          <div class="flex items-center gap-2" style="justify-content:space-between;">
            <div>
              <h2>${d.user.display_name}</h2>
              <p>@${d.user.username} · ${d.user.email}</p>
            </div>
            ${d.user.is_banned
              ? `<button class="btn btn-success" onclick="unbanUser('${id}')">Sbanna utente</button>`
              : `<button class="btn btn-danger" onclick="banUser('${id}')">Banna utente</button>`
            }
          </div>
          <div class="flex gap-3 mt-3" style="flex-wrap:wrap;font-size:0.85rem;color:var(--text-muted);">
            <span>Registrato: ${fmt(d.user.created_at)}</span>
            <span>Ultimo accesso: ${d.user.last_login ? fmt(d.user.last_login) : 'Mai'}</span>
            <span>Login totali: ${d.user.login_count}</span>
            ${d.user.is_banned ? `<span class="badge badge-danger">Bannato: ${d.user.ban_reason}</span>` : ''}
          </div>
        </div>
        <h3 class="mb-2">Ticket (${d.tickets.length})</h3>
        <div class="ticket-list mb-3">
          ${d.tickets.map(t => `
            <a class="ticket-item" onclick="go('ticket-${t.id}')">
              <div style="flex:1;"><div class="ticket-subject">${t.subject}</div><div class="ticket-meta">${t.category} · ${fmt(t.created_at)}</div></div>
              <span class="badge ${getStatusBadge(t.status)}">${t.status.replace('_',' ')}</span>
            </a>
          `).join('') || '<p style="color:var(--text-muted);">Nessun ticket</p>'}
        </div>
        <h3 class="mb-2">Attività recente</h3>
        <div class="card" style="max-height:300px;overflow-y:auto;">
          ${d.activity.map(a => `
            <div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:0.82rem;">
              <strong>${a.action}</strong> ${a.details || ''}<br>
              <span style="color:var(--text-muted);">${fmt(a.created_at)} · IP: ${a.ip_address || 'N/A'}</span>
            </div>
          `).join('') || '<p style="color:var(--text-muted);">Nessuna attività</p>'}
        </div>
      `;
    }

    async function renderActivity() {
      const r = await fetch('/api/admin/activity');
      const logs = await r.json();
      document.getElementById('mc').innerHTML = `
        <h2 style="margin-bottom:24px;">📋 Log attività</h2>
        <div class="table-wrap"><table>
          <thead><tr><th>Data</th><th>Utente</th><th>Azione</th><th>Dettagli</th><th>IP</th></tr></thead>
          <tbody>
            ${logs.map(l => `
              <tr>
                <td style="font-size:0.82rem;white-space:nowrap;">${fmt(l.created_at)}</td>
                <td>${l.display_name || l.username || 'Sistema'}</td>
                <td><span class="badge badge-muted">${l.action}</span></td>
                <td style="font-size:0.85rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;">${l.details || '-'}</td>
                <td style="font-size:0.82rem;font-family:monospace;">${l.ip_address || '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table></div>
      `;
    }

    async function banUser(id) {
      const reason = prompt('Motivo del ban:');
      if (reason === null) return;
      await fetch(`/api/admin/users/${id}/ban`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason || 'Violazione regolamento' })
      });
      go('users');
    }

    async function unbanUser(id) {
      if (!confirm('Sbannare questo utente?')) return;
      await fetch(`/api/admin/users/${id}/unban`, { method: 'PUT' });
      go('users');
    }

    function getStatusBadge(s) {
      return { aperto:'badge-primary', in_lavorazione:'badge-warning', risolto:'badge-success', chiuso:'badge-muted' }[s] || 'badge-muted';
    }

    function fmt(d) {
      if (!d) return '';
      const date = new Date(d + (d.includes('Z') ? '' : 'Z'));
      return date.toLocaleString('it-IT', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
