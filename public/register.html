<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati — Helpy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="nav-logo">💙 Helpy</a>
      <h2>Crea il tuo account</h2>
      <p class="subtitle">È gratis e ci vogliono solo 30 secondi</p>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="displayName">Come ti chiami?</label>
          <input type="text" id="displayName" class="form-input" placeholder="Es. Mario Rossi" required minlength="2" maxlength="50">
          <div class="form-hint">Il nome che vedranno gli altri</div>
        </div>
        <div class="form-group">
          <label for="username">Scegli un username</label>
          <input type="text" id="username" class="form-input" placeholder="Es. mario_rossi" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" autocomplete="username">
          <div class="form-hint">Solo lettere, numeri e underscore</div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="mario@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Almeno 8 caratteri" required minlength="8" oninput="checkPassword()" autocomplete="new-password">
          <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
          <div class="form-hint" id="passwordHint">Almeno 8 caratteri con una maiuscola, una minuscola e un numero</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">Crea account</button>
      </form>

      <div class="auth-footer">
        Hai già un account? <a href="/login">Accedi</a>
      </div>
    </div>
  </div>

  <script>
    function checkPassword() {
      const pw = document.getElementById('password').value;
      const bar = document.getElementById('strengthBar');
      let strength = 0;
      if (pw.length >= 8) strength++;
      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) strength++;
      if (/\d/.test(pw)) strength++;
      if (/[^a-zA-Z\d]/.test(pw)) strength++;
      const colors = ['#dc2626','#f59e0b','#f59e0b','#059669'];
      const widths = ['25%','50%','75%','100%'];
      bar.style.width = strength > 0 ? widths[strength - 1] : '0';
      bar.style.background = strength > 0 ? colors[strength - 1] : '';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errAlert = document.getElementById('errorAlert');
      const sucAlert = document.getElementById('successAlert');
      errAlert.classList.remove('show');
      sucAlert.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Creazione in corso...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            displayName: document.getElementById('displayName').value.trim(),
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        sucAlert.textContent = 'Account creato! Reindirizzamento...';
        sucAlert.classList.add('show');
        setTimeout(() => { window.location.href = '/app'; }, 1000);
      } catch (err) {
        errAlert.textContent = err.message;
        errAlert.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Crea account';
      }
    }
  </script>
</body>
</html>
